apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: nocturnal
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: redis
---
# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: nocturnal
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: nocturnal
spec:
  serviceName: redis-headless
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - sh
        - -c
        - |
          if [ "$(hostname)" = "redis-0" ]; then
            redis-server --requirepass "$REDIS_PASSWORD" \
              --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
          else
            redis-server --requirepass "$REDIS_PASSWORD" \
              --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru \
              --replicaof redis-0.redis-headless 6379 --masterauth "$REDIS_PASSWORD"
          fi
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nocturnal-secrets
              key: redis-password
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      # Uses cluster default StorageClass. Override per environment:
      # storageClassName: "fast-ssd"  # GKE SSD
      # storageClassName: "gp3"       # AWS EBS gp3
      resources:
        requests:
          storage: 5Gi
