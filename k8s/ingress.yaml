# Prerequisite: cert-manager must be installed and a ClusterIssuer must exist.
# Apply the ClusterIssuer below BEFORE this Ingress:
#
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     server: https://acme-v2.api.letsencrypt.org/directory
#     email: ${ACME_EMAIL}  # Replace with your email
#     privateKeySecretRef:
#       name: letsencrypt-prod-key
#     solvers:
#     - http01:
#         ingress:
#           class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nocturnal-ingress
  namespace: nocturnal
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Requires cert-manager ClusterIssuer with this name to exist in the cluster.
    # Change to match your issuer name, or remove if managing TLS certificates manually.
    cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER:-letsencrypt-prod}"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
  - hosts:
    - ${DOMAIN:-nocturnal.com}
    - www.${DOMAIN:-nocturnal.com}
    secretName: nocturnal-tls
  rules:
  - host: ${DOMAIN:-nocturnal.com}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: nocturnal-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nocturnal-frontend
            port:
              number: 80
  - host: www.${DOMAIN:-nocturnal.com}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nocturnal-service
            port:
              number: 5000
