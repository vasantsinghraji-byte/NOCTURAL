<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - Nocturnal Healthcare</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="/css/pages/roles-patient-booking-form.css">
    <script src="/js/config.js"></script>
    <script src="/js/frontend-session.js"></script>
    <script src="/js/patient-session.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="btn-back" id="backButton">← Back</button>
            <h1>Book Your Service</h1>
        </div>
    </div>

    <div class="container">
        <div class="booking-layout">
            <div class="form-section">
                <h2 class="section-title">📝 Booking Details</h2>

                <div class="service-info" id="serviceInfo">
                    <h3 id="serviceName">Loading...</h3>
                    <p id="servicePrice">₹0</p>
                </div>

                <form id="bookingForm">
                    <div id="errorDiv"></div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Preferred Date *</label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Preferred Time *</label>
                            <input type="time" id="time" name="time" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="timezone">Appointment Timezone *</label>
                        <select id="timezone" name="timezone" required></select>
                    </div>

                    <div class="form-group">
                        <label for="address">Service Address *</label>
                        <input type="text" id="address" name="address" required
                               placeholder="House/Flat No, Building Name">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required value="Bangalore">
                        </div>
                        <div class="form-group">
                            <label for="pincode">Pincode *</label>
                            <input type="text" id="pincode" name="pincode" required
                                   pattern="[0-9]{6}" maxlength="6" placeholder="560001">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="patientAge">Patient Age *</label>
                            <input type="number" id="patientAge" name="patientAge" required
                                   min="1" max="120" placeholder="30">
                        </div>
                        <div class="form-group">
                            <label for="patientGender">Patient Gender *</label>
                            <select id="patientGender" name="patientGender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="specialRequirements">Special Requirements (Optional)</label>
                        <textarea id="specialRequirements" name="specialRequirements"
                                  placeholder="Any specific instructions or requirements..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="prescriptionUrl">Prescription URL (if applicable)</label>
                        <input type="url" id="prescriptionUrl" name="prescriptionUrl"
                               placeholder="https://example.com/prescription.pdf">
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Proceed to Payment
                    </button>
                </form>
            </div>

            <div class="summary-section">
                <h2 class="section-title">💰 Price Summary</h2>

                <div class="summary-item">
                    <span>Base Price</span>
                    <span id="summaryBasePrice">₹0</span>
                </div>
                <div class="summary-item">
                    <span>Platform Fee (15%)</span>
                    <span id="summaryPlatformFee">₹0</span>
                </div>
                <div class="summary-item">
                    <span>GST (18%)</span>
                    <span id="summaryGST">₹0</span>
                </div>
                <div class="summary-item total">
                    <span>Total Amount</span>
                    <span id="summaryTotal">₹0</span>
                </div>

                <div class="payment-note">
                    <p class="payment-note-text">
                        💳 Secure payment powered by Razorpay
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/patient-booking-form.js"></script>
    <script src="/js/auto-inject-nav.js"></script>
</body>
</html>
