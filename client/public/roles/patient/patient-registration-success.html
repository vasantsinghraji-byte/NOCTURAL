<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Complete - Nocturnal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            align-items: center;
            background: linear-gradient(135deg, #eef7ff 0%, #f8fbff 100%);
            color: #1f2937;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .success-panel {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
            max-width: 560px;
            padding: 40px;
            text-align: center;
            width: 100%;
        }
        .badge {
            align-items: center;
            background: #dcfce7;
            border-radius: 999px;
            color: #166534;
            display: inline-flex;
            font-weight: 700;
            height: 56px;
            justify-content: center;
            margin-bottom: 20px;
            width: 56px;
        }
        h1 { color: #0f172a; font-size: 2rem; margin-bottom: 12px; }
        p { color: #475569; line-height: 1.6; margin-bottom: 20px; }
        .actions { display: grid; gap: 12px; margin-top: 28px; }
        .btn {
            border-radius: 10px;
            display: block;
            font-weight: 700;
            padding: 14px 18px;
            text-decoration: none;
        }
        .btn-primary { background: #2563eb; color: #ffffff; }
        .btn-secondary { background: #eff6ff; color: #1d4ed8; }
    </style>
</head>
<body>
    <main class="success-panel">
        <div class="badge">OK</div>
        <h1>Patient registration complete</h1>
        <p>Your Nocturnal patient account is ready. You can now continue to your dashboard and book home nursing, physiotherapy, elderly care, or recovery support.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/roles/patient/patient-dashboard.html">Continue to patient dashboard</a>
            <a class="btn btn-secondary" href="/roles/patient/booking-form.html">Start a home care booking</a>
        </div>
    </main>
</body>
</html>
