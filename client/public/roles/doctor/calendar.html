<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calendar - Nocturnal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/pages/roles-doctor-calendar.css">
    <script src="/js/config.js"></script>
    <script src="/js/frontend-session.js"></script>
    <script src="/js/doctor-session.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">🌙 Nocturnal</div>
        <div class="nav-links">
            <a href="/roles/doctor/doctor-dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/roles/doctor/browse-shifts-enhanced.html"><i class="fas fa-briefcase"></i> Browse</a>
            <a href="/roles/doctor/calendar.html" class="active"><i class="fas fa-calendar"></i> Calendar</a>
            <a href="/roles/doctor/earnings.html"><i class="fas fa-dollar-sign"></i> Earnings</a>
            <a href="/roles/doctor/achievements.html"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-calendar-alt"></i> My Calendar</h1>
            <p>View your shifts, manage availability, and check for conflicts</p>
        </div>

        <div class="layout">
            <!-- Calendar -->
            <div class="calendar-container">
                <div id="calendar"></div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Legend -->
                <div class="card">
                    <h3><i class="fas fa-palette"></i> Legend</h3>
                    <div class="legend-item">
                        <div class="legend-color legend-color-success"></div>
                        <span>Accepted Shifts</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-color-warning"></div>
                        <span>Pending Applications</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-color-danger"></div>
                        <span>Blackout Dates</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-color-neutral"></div>
                        <span>Personal Events</span>
                    </div>
                </div>

                <!-- Stats -->
                <div class="card">
                    <h3><i class="fas fa-chart-line"></i> This Month</h3>
                    <div class="stats-grid">
                        <div class="stat">
                            <span class="stat-value" id="shiftsThisMonth">0</span>
                            <span class="stat-label">Shifts</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="hoursThisMonth">0</span>
                            <span class="stat-label">Hours</span>
                        </div>
                    </div>
                </div>

                <!-- Warnings -->
                <div class="card is-hidden" id="warningsCard">
                    <h3><i class="fas fa-exclamation-triangle"></i> Warnings</h3>
                    <div id="warningsList"></div>
                </div>

                <!-- Actions -->
                <div class="card">
                    <h3><i class="fas fa-cog"></i> Actions</h3>
                    <button class="btn btn-primary btn-block" id="openAddEventBtn">
                        <i class="fas fa-plus"></i> Add Event
                    </button>
                    <button class="btn btn-success btn-block" id="openAvailabilityBtn">
                        <i class="fas fa-calendar-times"></i> Set Availability
                    </button>
                    <button class="btn btn-primary btn-block" id="syncCalendarBtn">
                        <i class="fas fa-sync"></i> Sync Calendar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeAddEventModalBtn">&times;</button>
            <h2>Add Calendar Event</h2>
            <form id="addEventForm">
                <div class="form-group">
                    <label>Event Type</label>
                    <select id="eventType" required>
                        <option value="BLACKOUT_DATE">Blackout Date (Unavailable)</option>
                        <option value="PERSONAL_EVENT">Personal Event</option>
                        <option value="VACATION">Vacation</option>
                        <option value="TRAINING">Training</option>
                        <option value="MEETING">Meeting</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="eventTitle" required placeholder="e.g., Family vacation">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="eventDescription" rows="3" placeholder="Optional details"></textarea>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="allDay"> All Day Event
                    </label>
                </div>
                <div id="timeFields">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="startTime">
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="endTime">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Add Event</button>
            </form>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventDetailsModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeEventDetailsModalBtn">&times;</button>
            <div id="eventDetailsContent"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="/js/doctor-calendar.js"></script>
    <!-- Unified Navigation & Notifications -->
    <script src="/js/auto-inject-nav.js"></script>
</body>
</html>
