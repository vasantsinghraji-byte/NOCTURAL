name: CD - Continuous Deployment

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: deploy
        options:
          - deploy
          - rollback
      rollback_version:
        description: 'Tag to roll back to (e.g., v1.2.0). Required for rollback.'
        required: false
        type: string

env:
  NODE_VERSION: '22.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || (github.event.inputs.environment == 'staging' && github.event.inputs.action != 'rollback'))
    environment:
      name: staging
      url: https://staging.nocturnal.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Create deployment package
        run: |
          tar -czf nocturnal-staging.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='tests' \
            .

      - name: Deploy to staging server
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: rsync, SSH, or cloud provider CLI
          echo "Deployment package created: nocturnal-staging.tar.gz"

      - name: Run database migrations
        run: npm run db:migrate || echo "No pending migrations"

      - name: Smoke tests
        run: |
          echo "Running smoke tests on staging..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 https://staging.nocturnal.com/api/v1/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke tests failed after 5 attempts"
          exit 1

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event.inputs.environment == 'production' && github.event.inputs.action != 'rollback')
    environment:
      name: production
      url: https://nocturnal.com
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build production assets
        run: npm run build:prod || npm run build || echo "No build required"

      - name: Create deployment package
        run: |
          tar -czf nocturnal-production.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='tests' \
            .

      - name: Backup current production
        run: |
          echo "Creating backup of current production..."
          # Add backup commands here

      - name: Deploy to production server
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          echo "Deployment package created: nocturnal-production.tar.gz"

      - name: Run database migrations
        run: npm run db:migrate || echo "No pending migrations"

      - name: Smoke tests
        run: |
          echo "Running smoke tests on production..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 https://nocturnal.com/api/v1/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke tests failed after 5 attempts"
          exit 1

      - name: Notify deployment success
        run: |
          echo "Production deployment successful!"
          # Add Slack/Discord/Email notification here

  # Rollback workflow
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Validate rollback version
        run: |
          if [ -z "${{ github.event.inputs.rollback_version }}" ]; then
            echo "Error: rollback_version is required for rollback action"
            exit 1
          fi
          echo "Rolling back ${{ github.event.inputs.environment }} to ${{ github.event.inputs.rollback_version }}"

      - name: Checkout target version
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rollback_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Create rollback deployment package
        run: |
          tar -czf nocturnal-rollback.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='tests' \
            .

      - name: Deploy rollback package
        run: |
          echo "Deploying ${{ github.event.inputs.rollback_version }} to ${{ github.event.inputs.environment }}..."
          # Add your deployment commands here
          echo "Rollback package created: nocturnal-rollback.tar.gz"

      - name: Run database migrations for target version
        run: npm run db:migrate || echo "No pending migrations"

      - name: Verify rollback
        run: |
          HEALTH_URL="https://nocturnal.com/api/v1/health"
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            HEALTH_URL="https://staging.nocturnal.com/api/v1/health"
          fi
          echo "Verifying rollback at $HEALTH_URL..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "$HEALTH_URL"; then
              echo "Rollback health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Rollback verification failed after 5 attempts"
          exit 1

  # Upload artifacts
  artifacts:
    name: Upload Build Artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release artifacts
        run: |
          tar -czf nocturnal-${{ github.ref_name }}.tar.gz .
          zip -r nocturnal-${{ github.ref_name }}.zip . -x "*.git*" "node_modules/*" "coverage/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            nocturnal-*.tar.gz
            nocturnal-*.zip
