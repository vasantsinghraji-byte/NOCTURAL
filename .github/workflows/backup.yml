name: Scheduled Database Backup

on:
  # Schedule disabled until MONGODB_URI secret is configured in repo/environment secrets.
  # Uncomment to re-enable once secrets are set:
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  BACKUP_RETENTION_DAYS: 30

jobs:
  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Validate MONGODB_URI secret
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "::error::MONGODB_URI secret is not configured. Add it to repository or environment secrets."
            exit 1
          fi
          echo "MONGODB_URI secret is configured."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MongoDB Database Tools
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-7.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools

      - name: Create backup
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ENV="${{ github.event.inputs.environment || 'production' }}"
          BACKUP_NAME="${ENV}_backup_${TIMESTAMP}"
          BACKUP_DIR="/tmp/backups/${BACKUP_NAME}"

          echo "Creating backup: ${BACKUP_NAME}"
          mongodump --uri="${MONGODB_URI}" --out="${BACKUP_DIR}" --gzip

          echo "Compressing backup..."
          tar -czf "/tmp/backups/${BACKUP_NAME}.tar.gz" -C "/tmp/backups" "${BACKUP_NAME}"
          rm -rf "${BACKUP_DIR}"

          BACKUP_SIZE=$(du -h "/tmp/backups/${BACKUP_NAME}.tar.gz" | cut -f1)
          echo "Backup created: ${BACKUP_NAME}.tar.gz (${BACKUP_SIZE})"
          echo "BACKUP_FILE=/tmp/backups/${BACKUP_NAME}.tar.gz" >> $GITHUB_ENV
          echo "BACKUP_NAME=${BACKUP_NAME}" >> $GITHUB_ENV

      - name: Verify backup integrity
        run: |
          echo "Verifying backup archive..."
          tar -tzf "${{ env.BACKUP_FILE }}" > /dev/null
          echo "Backup verified successfully"

      - name: Upload to S3
        if: env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          S3_BUCKET="nocturnal-backups-${ENV}"

          aws s3 cp "${{ env.BACKUP_FILE }}" "s3://${S3_BUCKET}/automated/${{ env.BACKUP_NAME }}.tar.gz"
          echo "Backup uploaded to s3://${S3_BUCKET}/automated/"

      - name: Cleanup old S3 backups
        if: env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          S3_BUCKET="nocturnal-backups-${ENV}"
          CUTOFF_DATE=$(date -d "${{ env.BACKUP_RETENTION_DAYS }} days ago" +%Y-%m-%d)

          echo "Removing backups older than ${CUTOFF_DATE}..."
          aws s3 ls "s3://${S3_BUCKET}/automated/" | while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $1}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ -n "$FILE_NAME" && "$FILE_DATE" < "$CUTOFF_DATE" ]]; then
              aws s3 rm "s3://${S3_BUCKET}/automated/${FILE_NAME}"
              echo "Deleted: ${FILE_NAME}"
            fi
          done

      - name: Upload backup as artifact (fallback)
        if: env.AWS_ACCESS_KEY_ID == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_NAME }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 7

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    steps:
      - name: Log backup failure
        run: |
          echo "::error::Database backup failed for ${{ github.event.inputs.environment || 'production' }}"
          echo "Check the backup job logs for details."
          echo "Manual backup can be run with: node scripts/backup-database.js"
