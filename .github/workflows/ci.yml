name: CI - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.x'
  MONGODB_VERSION: '6.0'

jobs:
  # Code Quality Checks
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        env:
          CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          CI_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          CI_RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          CI_RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}
        run: |
          DEFAULT_JWT_SECRET="ci-test-jwt-secret-placeholder-for-actions-only-not-a-real-secret-0001"
          DEFAULT_ENCRYPTION_KEY="$(printf 'a%.0s' {1..64})"
          cat > .env.test <<EOF
          NODE_ENV=test
          PORT=5001
          MONGODB_URI=mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET=${CI_JWT_SECRET:-$DEFAULT_JWT_SECRET}
          JWT_EXPIRE=7d
          ENCRYPTION_KEY=${CI_ENCRYPTION_KEY:-$DEFAULT_ENCRYPTION_KEY}
          ALLOWED_ORIGINS=http://localhost:3000
          RAZORPAY_KEY_ID=${CI_RAZORPAY_KEY_ID:-}
          RAZORPAY_KEY_SECRET=${CI_RAZORPAY_KEY_SECRET:-}
          EOF

      - name: Wait for MongoDB
        run: |
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; do sleep 1; done'

      - name: Run fast CI test suite
        run: npm run test:ci
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret-placeholder-for-actions-only-not-a-real-secret-0001' }}
          JWT_EXPIRE: 7d
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || format('{0}{1}{2}{3}', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa') }}
          RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}

      - name: Upload test coverage artifact
        if: success() && env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # Legacy Jest suites are still useful signal, but not clean enough to gate deploys yet.
  legacy-tests:
    name: Legacy Jest Quarantine (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; do sleep 1; done'

      - name: Run quarantined legacy Jest suites
        run: npm run test:legacy:quarantine
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret-placeholder-for-actions-only-not-a-real-secret-0001' }}
          JWT_EXPIRE: 7d
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || format('{0}{1}{2}{3}', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa') }}
          ALLOWED_ORIGINS: http://localhost:3000
          RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}

  legacy-healthy:
    name: Legacy Healthy Jest Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; do sleep 1; done'

      - name: Run healthy legacy Jest suites
        run: npm run test:legacy:healthy
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret-placeholder-for-actions-only-not-a-real-secret-0001' }}
          JWT_EXPIRE: 7d
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || format('{0}{1}{2}{3}', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa', 'aaaaaaaaaaaaaaaa') }}
          ALLOWED_ORIGINS: http://localhost:3000
          RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}

  # Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for scanning all commits

      - name: Run Gitleaks on current tree
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            dir /repo --no-banner --redact --report-format sarif --report-path /repo/gitleaks-results.sarif --exit-code 1

      - name: Upload Gitleaks SARIF artifact
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif
          retention-days: 7
          if-no-files-found: ignore

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate production audit report
        run: npm audit --omit=dev --audit-level=moderate --json > npm-audit-prod.json || true

      - name: Summarize production audit report
        run: |
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('npm-audit-prod.json','utf8')); const m=report.metadata?.vulnerabilities||{}; console.log('Production dependency audit (non-blocking):'); console.log(JSON.stringify(m, null, 2));"

      - name: Upload production audit report
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit-prod
          path: npm-audit-prod.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Run auth security gate
        run: npm run test:security-gate

  # Build + Deployment Gate Validation
  build:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [lint, test, legacy-healthy]
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run deployment gate validation
        run: npm run test:deploy-gate

  # Validate container build without publishing
  container-smoke:
    name: Container Smoke Build
    runs-on: ubuntu-latest
    needs: [lint, test, legacy-healthy]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: nocturnal-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # API Documentation
  docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Generate API docs
        run: |
          echo "API documentation generation placeholder"
          # Add Swagger/OpenAPI doc generation here
        continue-on-error: true

  # Notification
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [lint, test, legacy-healthy, legacy-tests, secret-scan, security, build, container-smoke]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check status
        run: |
          echo "CI Pipeline completed"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Legacy Healthy Tests: ${{ needs.legacy-healthy.result }}"
          echo "Legacy Quarantine Tests: ${{ needs.legacy-tests.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Container Smoke: ${{ needs.container-smoke.result }}"
