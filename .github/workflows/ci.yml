name: CI - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.x'
  MONGODB_VERSION: '6.0'

jobs:
  # Code Quality Checks
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        env:
          CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          CI_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          CI_RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          CI_RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          PORT=5001
          MONGODB_URI=mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET=${CI_JWT_SECRET:-ci-test-jwt-secret-placeholder}
          JWT_EXPIRE=7d
          ENCRYPTION_KEY=${CI_ENCRYPTION_KEY:-ci-test-encryption-key-32chars!}
          ALLOWED_ORIGINS=http://localhost:3000
          RAZORPAY_KEY_ID=${CI_RAZORPAY_KEY_ID:-}
          RAZORPAY_KEY_SECRET=${CI_RAZORPAY_KEY_SECRET:-}
          EOF

      - name: Wait for MongoDB
        run: |
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; do sleep 1; done'

      - name: Run fast CI test suite
        run: npm run test:ci
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://admin:testpass@localhost:27017/nocturnal_test?authSource=admin
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret-placeholder' }}
          JWT_EXPIRE: 7d
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || 'ci-test-encryption-key-32chars!' }}
          RAZORPAY_KEY_ID: ${{ secrets.CI_RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.CI_RAZORPAY_KEY_SECRET }}

      - name: Upload test coverage artifact
        if: success() && env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for scanning all commits

      - name: Run Gitleaks on current tree
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            dir /repo --no-banner --redact --report-format sarif --report-path /repo/gitleaks-results.sarif --exit-code 1

      - name: Upload Gitleaks SARIF artifact
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif
          retention-days: 7
          if-no-files-found: ignore

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for vulnerabilities
        run: npm audit --omit=dev --audit-level=high || true

      - name: Run auth security gate
        run: npm run test:security-gate

  # Build + Deployment Gate Validation
  build:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: node ./node_modules/playwright/cli.js install --with-deps chromium

      - name: Run deployment gate validation
        run: npm run test:deploy-gate
        env:
          PLAYWRIGHT_STRICT_LAUNCH: 'true'

  # Validate container build without publishing
  container-smoke:
    name: Container Smoke Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: nocturnal-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # API Documentation
  docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Generate API docs
        run: |
          echo "API documentation generation placeholder"
          # Add Swagger/OpenAPI doc generation here
        continue-on-error: true

  # Notification
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan, security, build, container-smoke]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check status
        run: |
          echo "CI Pipeline completed"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Container Smoke: ${{ needs.container-smoke.result }}"
